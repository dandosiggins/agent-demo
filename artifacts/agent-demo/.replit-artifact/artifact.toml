kind = "web"
previewPath = "/"
title = "Agentic AI Demo"
version = "1.0.0"
id = "artifacts/agent-demo"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22651

[services.development]
run = "pnpm --filter @workspace/agent-demo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/agent-demo", "run", "build" ]
publicDir = "artifacts/agent-demo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22651"
BASE_PATH = "/"
